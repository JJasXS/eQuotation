<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Guest Sign In</title>
    <link rel="stylesheet" href="/static/css/signInGuest.css">
</head>
<body>
    <div class="guest-container">
        <div class="guest-card">
            <center><h1>New Guest Sign In</h1></center>
            <p class="subtitle" style="text-align:center;margin-bottom:18px;">Create customer with company + optional SQL fields</p>

            <form id="new-guest-signin-form" onsubmit="handleNewGuestSignIn(event)">
                <div class="form-section">
                    <div class="section-title">Required Fields</div>
                    <div class="form-grid">
                        <div class="form-group">
                            <input type="text" id="companyname" name="companyname" placeholder="companyname" required>
                        </div>
                        <div class="form-group">
                            <div style="font-size:13px;color:#6c7a89;margin-bottom:2px;">Select Area</div>
                            <select id="area" name="area">
                                <option value="">Loading area...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <div style="font-size:13px;color:#6c7a89;margin-bottom:2px;">Select Currency</div>
                            <select id="currencycode" name="currencycode">
                                <option value="">Loading currency...</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <div class="section-title">Optional Registration Details</div>
                    <div class="form-grid">
                        <div class="form-group">
                            <input type="text" id="tin" name="tin" placeholder="tin">
                        </div>
                        <div class="form-group">
                            <input type="text" id="brn2" name="brn2" placeholder="brn2">
                        </div>
                        <div class="form-group">
                            <input type="text" id="salestaxno" name="salestaxno" placeholder="salestaxno">
                        </div>
                        <div class="form-group">
                            <input type="text" id="servicetaxno" name="servicetaxno" placeholder="servicetaxno">
                        </div>
                        <div class="form-group">
                            <input type="text" id="taxexemptno" name="taxexemptno" placeholder="taxexemptno">
                        </div>
                        <div class="form-group">
                            <label for="taxexpdate" style="margin-bottom:6px;">taxexpdate</label>
                            <input type="date" id="taxexpdate" name="taxexpdate">
                        </div>
                        <div class="form-group">
                            <input type="number" id="idtype" name="idtype" placeholder="idtype" min="0" step="1">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <div class="section-title">Optional Address Details</div>
                    <div class="form-grid">
                        <div class="form-group">
                            <input type="text" id="attention" name="attention" placeholder="attention">
                        </div>
                        <div class="form-group">
                            <input type="text" id="address1" name="address1" placeholder="address 1">
                        </div>
                        <div class="form-group">
                            <input type="text" id="address2" name="address2" placeholder="address 2">
                        </div>
                        <div class="form-group">
                            <input type="text" id="address3" name="address3" placeholder="address 3">
                        </div>
                        <div class="form-group">
                            <input type="text" id="address4" name="address4" placeholder="address 4">
                        </div>
                        <div class="form-group">
                            <input type="text" id="postcode" name="postcode" placeholder="postcode">
                        </div>
                        <div class="form-group">
                            <input type="text" id="city" name="city" placeholder="city" readonly>
                        </div>
                        <div class="form-group">
                            <input type="text" id="state" name="state" placeholder="state" readonly>
                        </div>
                        <div class="form-group">
                            <input type="text" id="country" name="country" placeholder="country (e.g. MY)">
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <a href="/login" class="btn-back">Back to Login</a>
                    <button type="submit" class="btn-submit">Create Customer</button>
                </div>
            </form>

            <div id="guest-message" class="guest-message"></div>
            <pre id="payload-preview" class="payload-preview"></pre>
        </div>
    </div>

    <script src="/static/js/newSignInGuest.js"></script>
</body>
</html>

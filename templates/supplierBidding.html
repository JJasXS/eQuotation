<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier Bidding</title>
    <link rel="stylesheet" href="/static/css/chat.css">
    <link rel="stylesheet" href="/static/css/hamburger_menu.css">
    <style>
        body { background: linear-gradient(160deg, #f3f6ef 0%, #dfe8d3 100%); color: #1f2a1f; }
        .bidding-shell { max-width: 1200px; margin: 20px auto; padding: 16px; }
        .bidding-card { background: #ffffff; border: 1px solid #d4dec9; border-radius: 12px; box-shadow: 0 8px 24px rgba(31, 42, 31, 0.08); }
        .bidding-head { padding: 16px; border-bottom: 1px solid #e4ecd9; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
        .muted { color: #5f6f5a; font-size: 13px; }
        .invites-list { padding: 16px; display: grid; gap: 10px; }
        .invite-row { border: 1px solid #d8e4cb; border-radius: 10px; padding: 12px; background: #f8fbf5; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .invite-row button, .action-btn { background: #245c2e; color: #fff; border: none; border-radius: 8px; padding: 8px 14px; cursor: pointer; }
        .invite-row button:disabled, .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .status-chip { display: inline-block; border-radius: 999px; padding: 3px 10px; font-size: 11px; font-weight: 600; }
        .status-open { background: #e4f4e1; color: #1f6b2a; }
        .status-responded { background: #fff3d7; color: #8a6300; }
        .status-awarded { background: #dff0ff; color: #12598f; }
        .status-closed { background: #f0f0f0; color: #636363; }
        .bidding-workbench { margin-top: 16px; display: none; }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border-bottom: 1px solid #e8efe1; padding: 8px; font-size: 13px; text-align: left; }
        th { background: #f4f9ee; color: #2f422d; }
        input[type='number'], input[type='text'] { width: 100%; padding: 6px 8px; border: 1px solid #cbd8bf; border-radius: 6px; }
        .footer-actions { padding: 16px; border-top: 1px solid #e4ecd9; display: flex; justify-content: flex-end; gap: 10px; align-items: center; flex-wrap: wrap; }
        .secondary-btn { background: #ffffff; color: #245c2e; border: 1px solid #245c2e; border-radius: 8px; padding: 8px 14px; cursor: pointer; }
        #supplier-bid-message { padding: 12px 16px; font-size: 13px; display: none; }
        .bid-readonly-cell { background: #f5f8f1; color: #1f2a1f; }
        #bid-decision-panel { padding: 12px 16px; border-top: 1px solid #e4ecd9; background: #f8fbf5; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container" style="min-height: 90vh;">
        <div class="main-content">
            <div class="header" style="display:flex;justify-content:space-between;align-items:center;gap:16px;">
                <div style="display:flex;align-items:center;gap:16px;">
                    {% include 'components/hamburger_menu.html' %}
                    <div>
                        <h3 class="header-title" style="margin:0;">Supplier Bidding</h3>
                        <div class="muted">Logged in as {{ user_name }} | Supplier Code: <strong id="supplier-code-text">{{ supplier_code }}</strong></div>
                    </div>
                </div>
                <button class="action-btn" onclick="loadInvitations()">Refresh</button>
            </div>

            <div class="bidding-shell">
                <div class="bidding-card">
                    <div class="bidding-head">
                        <div>
                            <h2 style="margin:0;">My Invitations</h2>
                            <div class="muted">Select an invitation and submit your item-level bid.</div>
                        </div>
                    </div>
                    <div id="invites-list" class="invites-list">
                        <div class="muted">Loading invitations...</div>
                    </div>
                </div>

                <div id="bidding-workbench" class="bidding-workbench bidding-card">
                    <div class="bidding-head">
                        <div>
                            <h3 id="active-request-title" style="margin:0;">Bid Details</h3>
                            <div id="active-request-subtitle" class="muted"></div>
                        </div>
                    </div>
                    <div class="table-wrap">
                        <table>
                            <thead id="bid-lines-thead"></thead>
                            <tbody id="bid-lines-body"></tbody>
                        </table>
                    </div>
                    <div id="bid-decision-panel" style="display: none;">
                        <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;">
                            <button type="button" class="secondary-btn" id="view-reason-btn">View admin decision reason</button>
                            <span id="bid-status-hint" class="muted"></span>
                        </div>
                        <pre id="bid-reason-text" style="display:none;white-space:pre-wrap;margin:10px 0 0;font-family:inherit;font-size:13px;"></pre>
                    </div>
                    <div id="supplier-bid-message"></div>
                    <div class="footer-actions">
                        <button class="secondary-btn" type="button" onclick="resetWorkbench()">Cancel</button>
                        <button class="action-btn" type="button" id="submit-bid-btn" onclick="submitBid()">Submit Bid</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/hamburger_menu.js"></script>
    <script>
        let activeInvite = null;
        let activeRequest = null;
        let workbenchReadOnly = false;
        const supplierCode = '{{ supplier_code }}'.trim();

        function chipClass(status) {
            const normalized = String(status || '').toUpperCase();
            if (normalized === 'OPEN') return 'status-open';
            if (normalized === 'RESPONDED' || normalized === 'SUBMITTED') return 'status-responded';
            // Supplier-facing wording: show APPROVED as ACCEPTED.
            if (normalized === 'AWARDED' || normalized === 'APPROVED' || normalized === 'ACCEPTED') return 'status-awarded';
            return 'status-closed';
        }

        function displayBidStatus(status) {
            const normalized = String(status || '').toUpperCase();
            // Supplier-facing wording:
            // - Any approved/awarded state should read as ACCEPTED.
            if (
                normalized === 'APPROVED'
                || normalized === 'AWARDED'
                || normalized === 'ACCEPTED'
                || normalized.startsWith('APPROV')
            ) {
                return 'ACCEPTED';
            }
            return String(status || '').trim() || 'OPEN';
        }

        function escapeHtml(text) {
            return String(text || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function formatDateText(value) {
            if (!value) return '-';
            const raw = String(value).trim();
            if (!raw) return '-';
            const onlyDate = raw.split('T')[0].split(' ')[0];
            const dateObj = new Date(onlyDate);
            if (Number.isNaN(dateObj.getTime())) return raw;
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function showBidMessage(message, isError) {
            const box = document.getElementById('supplier-bid-message');
            box.style.display = 'block';
            box.textContent = message;
            box.style.background = isError ? '#fde3e3' : '#e4f4e1';
            box.style.color = isError ? '#8d1f1f' : '#1f6b2a';
        }

        function clearBidMessage() {
            const box = document.getElementById('supplier-bid-message');
            box.style.display = 'none';
            box.textContent = '';
        }

        function renderInvitations(rows) {
            const list = document.getElementById('invites-list');
            if (!Array.isArray(rows) || !rows.length) {
                list.innerHTML = '<div class="muted">No invitations available.</div>';
                return;
            }

            list.innerHTML = rows.map((row) => {
                const bidStatus = row.bidStatus || row.inviteStatus || 'OPEN';
                const bidStatusLabel = displayBidStatus(bidStatus);
                const inviteClosed = String(row.inviteStatus || '').toUpperCase() === 'CLOSED';
                const inviteAwarded = String(row.inviteStatus || '').toUpperCase() === 'AWARDED';
                const reqDel = formatDateText(row.requestDeliveryDate);
                const btnLabel = (inviteClosed || inviteAwarded) ? 'View bid' : 'Open';
                // Do not embed request_no in onclick — JSON quotes break the HTML attribute and clicks stop working.
                return `
                    <div class="invite-row">
                        <div>
                            <div><strong>${escapeHtml(row.requestNumber || ('PR-' + row.requestDockey))}</strong></div>
                            <div class="muted">Req. delivery: ${escapeHtml(reqDel)} | Bid Status: <span class="status-chip ${chipClass(bidStatusLabel)}">${escapeHtml(bidStatusLabel)}</span></div>
                        </div>
                        <button type="button" class="invite-open-btn" data-request-id="${Number(row.requestDockey)}" data-invite-closed="${inviteClosed ? '1' : '0'}">${btnLabel}</button>
                    </div>
                `;
            }).join('');

            list.querySelectorAll('.invite-open-btn').forEach((btn) => {
                btn.addEventListener('click', () => {
                    const rid = Number(btn.getAttribute('data-request-id') || 0);
                    const closed = btn.getAttribute('data-invite-closed') === '1';
                    openInvite(rid, '', closed);
                });
            });
        }

        async function loadInvitations() {
            const list = document.getElementById('invites-list');
            list.innerHTML = '<div class="muted">Loading invitations...</div>';

            const qs = supplierCode ? ('?supplierCode=' + encodeURIComponent(supplierCode)) : '';
            const res = await fetch('/api/procurement/bidding/my-invitations' + qs);
            const body = await res.json();
            if (!res.ok || !body.success) {
                list.innerHTML = `<div class="muted" style="color:#a43f3f;">${escapeHtml(body.error || 'Failed to load invitations')}</div>`;
                return;
            }
            renderInvitations(body.data || []);
        }

        function setDecisionPanel(myBid, readOnly) {
            const panel = document.getElementById('bid-decision-panel');
            const btn = document.getElementById('view-reason-btn');
            const pre = document.getElementById('bid-reason-text');
            const hint = document.getElementById('bid-status-hint');
            pre.style.display = 'none';
            pre.textContent = '';
            btn.disabled = false;
            btn.textContent = 'View admin decision reason';
            if (!myBid || !readOnly) {
                panel.style.display = 'none';
                return;
            }
            const st = String(myBid.status || '').toUpperCase();
            const terminal = st === 'APPROVED' || st === 'REJECTED';
            if (!terminal) {
                panel.style.display = 'none';
                return;
            }
            panel.style.display = 'block';
            hint.textContent = st === 'APPROVED' ? '(Accepted — pricing below is read-only)' : '(Rejected — pricing below is read-only)';
            const reason = String(myBid.udfReason || '').trim();
            btn.onclick = () => {
                if (!reason) {
                    alert('No decision reason was recorded by admin.');
                    return;
                }
                const open = pre.style.display !== 'block';
                pre.style.display = open ? 'block' : 'none';
                pre.textContent = reason;
            };
        }

        function bidLineMap(myBid) {
            const map = {};
            if (!myBid || !Array.isArray(myBid.lines)) return map;
            myBid.lines.forEach((l) => {
                map[Number(l.detailId)] = l;
            });
            return map;
        }

        async function openInvite(requestId, requestNo, inviteClosed) {
            clearBidMessage();
            activeInvite = { requestId, requestNo };
            const qs = new URLSearchParams({
                request_id: String(requestId),
                request_no: requestNo || '',
            });
            if (supplierCode) qs.set('supplierCode', supplierCode);
            const res = await fetch('/api/procurement/bidding/purchase-request-details?' + qs.toString());
            const body = await res.json();
            if (!res.ok || !body.success) {
                alert(body.error || 'Failed to load request details');
                return;
            }
            activeRequest = body;

            let readOnly = !!inviteClosed;
            const mb = body.myBid;
            if (mb) {
                const st = String(mb.status || '').toUpperCase();
                if (st === 'APPROVED' || st === 'REJECTED') readOnly = true;
            }
            workbenchReadOnly = readOnly;

            document.getElementById('active-request-title').textContent = 'Bid for ' + (body.requestNumber || ('PR-' + body.requestId));
            const reqDel = formatDateText(body.requiredDeliveryDate);
            document.getElementById('active-request-subtitle').innerHTML =
                'Purchase request delivery / required date: <strong>' + escapeHtml(reqDel) + '</strong>. ' +
                (readOnly ? 'Your submitted pricing is shown below (read-only).' : 'Fill in your quote and submit to admin for review.');

            const details = body.details || [];
            const blMap = bidLineMap(mb);

            const thead = document.getElementById('bid-lines-thead');
            if (readOnly) {
                thead.innerHTML = '<tr><th>Item</th><th>Delivery Date</th><th>Requested Qty</th><th>Bid Qty</th><th>Bid Unit Price</th><th>Tax</th><th>Amount</th><th>Lead Days</th><th>Remarks</th></tr>';
            } else {
                thead.innerHTML = '<tr><th>Item</th><th>Delivery Date</th><th>Requested Qty</th><th>Bid Qty</th><th>Bid Unit Price</th><th>Lead Days</th><th>Remarks</th></tr>';
            }

            const rows = details.map((line) => {
                const lid = Number(line.id);
                const bl = blMap[lid] || {};
                const dq = Number(bl.quantity != null ? bl.quantity : line.quantity || 0).toFixed(2);
                const dup = (bl.unitPrice != null && bl.unitPrice !== '')
                    ? Number(bl.unitPrice).toFixed(2)
                    : Number(0).toFixed(2);
                const tax = Number(bl.tax != null ? bl.tax : 0).toFixed(2);
                const amt = Number(bl.amount != null ? bl.amount : 0).toFixed(2);
                const ld = Number(bl.leadDays != null ? bl.leadDays : 0);
                const rm = String(bl.remarks || '').trim();

                if (readOnly) {
                    return `
                        <tr data-detail-id="${lid}">
                            <td>${escapeHtml(line.itemCode)} - ${escapeHtml(line.itemName || line.description)}</td>
                            <td class="bid-readonly-cell">${escapeHtml(formatDateText(line.deliveryDate))}</td>
                            <td class="bid-readonly-cell">${Number(line.quantity || 0).toFixed(2)}</td>
                            <td class="bid-readonly-cell">${dq}</td>
                            <td class="bid-readonly-cell">${dup}</td>
                            <td class="bid-readonly-cell">${tax}</td>
                            <td class="bid-readonly-cell">${amt}</td>
                            <td class="bid-readonly-cell">${ld}</td>
                            <td class="bid-readonly-cell">${escapeHtml(rm) || '-'}</td>
                        </tr>`;
                }

                const qtyVal = bl.quantity != null ? dq : Number(line.quantity || 0).toFixed(2);
                const priceVal = (bl.unitPrice != null && bl.unitPrice !== '') ? Number(bl.unitPrice).toFixed(2) : '';
                const ldVal = bl.leadDays != null ? String(ld) : '0';
                const remarksAttr = String(rm).replace(/"/g, '&quot;');
                return `
                    <tr data-detail-id="${lid}">
                        <td>${escapeHtml(line.itemCode)} - ${escapeHtml(line.itemName || line.description)}</td>
                        <td>${escapeHtml(formatDateText(line.deliveryDate))}</td>
                        <td>${Number(line.quantity || 0).toFixed(2)}</td>
                        <td><input type="number" step="0.01" min="0" class="bid-qty" value="${qtyVal}"></td>
                        <td><input type="number" step="0.01" min="0" class="bid-unit-price" value="${priceVal}" placeholder="Enter quote unit price"></td>
                        <td><input type="number" step="1" min="0" class="bid-lead-days" value="${ldVal}"></td>
                        <td><input type="text" class="bid-remarks" placeholder="Optional" value="${remarksAttr}"></td>
                    </tr>`;
            }).join('');

            const colEmpty = readOnly ? 9 : 7;
            document.getElementById('bid-lines-body').innerHTML = rows || ('<tr><td colspan="' + colEmpty + '" class="muted">No lines available</td></tr>');
            document.getElementById('submit-bid-btn').style.display = readOnly ? 'none' : 'inline-block';
            setDecisionPanel(mb, readOnly);

            document.getElementById('bidding-workbench').style.display = 'block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function collectBidLines() {
            const bodyRows = Array.from(document.querySelectorAll('#bid-lines-body tr[data-detail-id]'));
            return bodyRows.map((row) => {
                return {
                    detailId: Number(row.dataset.detailId),
                    quantity: Number((row.querySelector('.bid-qty') || {}).value || 0),
                    unitPrice: Number((row.querySelector('.bid-unit-price') || {}).value || 0),
                    leadDays: Number((row.querySelector('.bid-lead-days') || {}).value || 0),
                    remarks: String((row.querySelector('.bid-remarks') || {}).value || '').trim(),
                };
            }).filter((line) => line.detailId > 0);
        }

        async function submitBid() {
            if (workbenchReadOnly) {
                showBidMessage('This bid is read-only.', true);
                return;
            }
            if (!activeInvite || !activeRequest) {
                alert('Please open an invitation first.');
                return;
            }
            const lines = collectBidLines();
            if (!lines.length) {
                showBidMessage('No bid lines to submit.', true);
                return;
            }

            const btn = document.getElementById('submit-bid-btn');
            btn.disabled = true;
            clearBidMessage();

            try {
                const res = await fetch('/api/procurement/bidding/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        requestId: activeInvite.requestId,
                        requestNumber: activeInvite.requestNo,
                        supplierCode,
                        bidLines: lines,
                    }),
                });
                const body = await res.json();
                if (!res.ok || !body.success) {
                    showBidMessage(body.error || 'Failed to submit bid', true);
                    return;
                }
                showBidMessage('Bid submitted successfully. Awaiting admin review.', false);
                await loadInvitations();
            } catch (err) {
                showBidMessage('Bid submission failed: ' + err.message, true);
            } finally {
                btn.disabled = false;
            }
        }

        function resetWorkbench() {
            activeInvite = null;
            activeRequest = null;
            workbenchReadOnly = false;
            clearBidMessage();
            document.getElementById('bid-decision-panel').style.display = 'none';
            document.getElementById('bidding-workbench').style.display = 'none';
            document.getElementById('bid-lines-body').innerHTML = '';
            document.getElementById('bid-lines-thead').innerHTML = '';
            document.getElementById('submit-bid-btn').style.display = 'inline-block';
        }

        loadInvitations();
    </script>
</body>
</html>

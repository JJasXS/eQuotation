<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - View All Quotations</title>
    <link rel="stylesheet" href="/static/css/chat.css">
    <link rel="stylesheet" href="/static/css/hamburger_menu.css">
    <link rel="stylesheet" href="/static/css/orderQuotation.css">
    <link rel="stylesheet" href="/static/css/adminViewQuotations.css">
    <style>
        .active-tab-controls {
            display: none;
            gap: 15px;
            align-items: center;
            padding: 12px;
            background: #1a1f2e;
            border-radius: 6px;
            margin-bottom: 12px;
            border: 1px solid #343b46;
        }
        .active-tab-controls.show {
            display: flex;
        }
        .btn-delete-active {
            padding: 8px 16px;
            background-color: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-delete-active:disabled {
            background-color: #4a4f5a;
            opacity: 0.65;
        }
        .quotation-card__header-layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 110px 180px;
            gap: 16px;
            align-items: start;
            margin-bottom: 12px;
        }
        .quotation-card__info {
            min-width: 0;
        }
        .quotation-card__info-grid {
            display: grid;
            grid-template-columns: 150px minmax(0, 1fr) 130px 130px;
            gap: 12px;
            align-items: start;
        }
        .quotation-card__field {
            min-width: 0;
        }
        .quotation-card__field-label {
            display: block;
            margin-bottom: 4px;
            color: #9ba7b6;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }
        .quotation-card__field-value {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
            color: #e4e9f1;
            font-size: 13px;
        }
        .quotation-card__field-value--wrap {
            display: block;
            word-break: break-word;
        }
        .quotation-card__amount-col,
        .quotation-card__button-col {
            display: grid;
            justify-items: end;
            align-content: start;
            gap: 10px;
            min-width: 0;
        }
        .quotation-card__button-col {
            justify-items: stretch;
        }
        .quotation-card__amount {
            background: #4b6e9e;
            color: #fff;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            text-align: right;
        }
        .quotation-card__side-actions {
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;
            align-items: stretch;
            gap: 8px;
            width: 100%;
        }
        @media (max-width: 900px) {
            .quotation-card__header-layout {
                grid-template-columns: 1fr;
            }
            .quotation-card__info-grid {
                grid-template-columns: 1fr 1fr;
            }
            .quotation-card__amount-col,
            .quotation-card__button-col {
                justify-items: start;
            }
            .quotation-card__side-actions {
                align-items: flex-start;
            }
        }
        @media (max-width: 640px) {
            .quotation-card__info-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-content">
            <div class="header">
                {% include 'components/admin_hamburger_menu.html' %}
                <div>
                    <h3 class="header-title">All Quotations</h3>
                    <div style="font-size: 12px; color: #9ba7b6; margin-top: 4px;">Admin: {{ user_email }}</div>
                </div>
            </div>

            <div class="tab-content active">
                <div id="quotation-content" style="padding: 20px;">
                    <div style="padding: 20px; text-align: center; color: #888;">Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal-active" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: white; border-radius: 8px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15); max-width: 400px; width: 90%; overflow: hidden;">
            <div style="padding: 20px; background-color: #f8f9fa; border-bottom: 1px solid #e0e0e0;">
                <h2 style="margin: 0; font-size: 18px; color: #333;">Confirm Delete</h2>
            </div>
            <div style="padding: 20px;">
                <p style="margin: 10px 0; color: #555; font-size: 14px;">Are you sure you want to delete <span id="delete-count-active">0</span> quotation(s)?</p>
                <p style="color: #d32f2f !important; font-weight: 500; margin-top: 15px;">⚠️ This action will mark the quotations as cancelled.</p>
            </div>
            <div style="padding: 15px 20px; background-color: #f8f9fa; border-top: 1px solid #e0e0e0; display: flex; justify-content: flex-end; gap: 10px;">
                <button id="cancel-delete-active-btn" style="padding: 8px 16px; background-color: #e0e0e0; color: #333; border: none; border-radius: 4px; cursor: pointer; font-weight: 600;">Cancel</button>
                <button id="confirm-delete-active-btn" style="padding: 8px 16px; background-color: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600;">Delete</button>
            </div>
        </div>
    </div>

    <!-- Success/Error Messages -->
    <div id="success-message-active" style="display: none; position: fixed; top: 20px; right: 20px; background: #4caf50; color: white; padding: 16px 24px; border-radius: 4px; z-index: 1001; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);">
        <span>✓ Quotations deleted successfully!</span>
    </div>
    <div id="error-message-active" style="display: none; position: fixed; top: 20px; right: 20px; background: #f44336; color: white; padding: 16px 24px; border-radius: 4px; z-index: 1001; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);">
        <span></span>
    </div>

    <script src="/static/js/admin_hamburger_menu.js"></script>
    <script src="/static/js/adminViewQuotations.js"></script>
</body>
</html>

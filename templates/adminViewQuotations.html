<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - View All Quotations</title>
    <link rel="stylesheet" href="/static/css/chat.css">
    <link rel="stylesheet" href="/static/css/hamburger_menu.css">
    <link rel="stylesheet" href="/static/css/orderQuotation.css">
</head>
<body>
    <div class="container">
        <div class="main-content">
            <div class="header">
                {% include 'components/admin_hamburger_menu.html' %}
                <div>
                    <h3 class="header-title">All Quotations</h3>
                    <div style="font-size: 12px; color: #9ba7b6; margin-top: 4px;">Admin: {{ user_email }}</div>
                </div>
            </div>

    {% if user_type == 'admin' %}
    <div style="margin-bottom: 18px; display: flex; justify-content: center;">
        <div style="display: flex; gap: 8px; align-items: center;  padding: 16px 24px; ">
            <select id="company-filter-dropdown" style="padding: 7px 12px; border-radius: 5px; border: 1px solid #3d4654; background: #232a36; color: #e4e9f1; font-size: 14px; width: 240px;">
                <option value="">All Companies</option>
            </select>
            <button id="company-filter-clear" style="padding: 7px 12px; border-radius: 5px; background: #2d3440; color: #9ba7b6; border: 1px solid #3d4654; cursor: pointer; font-size: 14px;">Clear</button>
        </div>
    </div>
    {% endif %}
            <div class="tab-content active">
                <div id="quotation-content" style="padding: 20px;">
                    <div style="padding: 20px; text-align: center; color: #888;">Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/admin_hamburger_menu.js"></script>
    <script src="/static/js/adminViewQuotations.js"></script>
</body>
</html>

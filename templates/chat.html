<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot UI</title>
    <link rel="stylesheet" href="/static/css/chat.css">
    <link rel="stylesheet" href="/static/css/hamburger_menu.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">
                {% include 'components/hamburger_menu.html' %}
                <h2>Chats</h2>
            </div>
            <div style="padding: 10px 16px; border-bottom: 1px solid #343b46;">
                <input type="text" id="search-input" placeholder="Search chats..." style="width: 100%; padding: 8px 12px; border-radius: 20px; border: 1px solid #3a424e; font-size: 14px; background: #2d3440; color:#e4e9f1; outline: none;" />
            </div>
            <div id="chat-tabs"></div>
            <div style="padding: 12px 16px; border-top: 1px solid #343b46; display: flex; gap: 8px;">
                <input type="text" id="new-chat-name" placeholder="New chat name..." style="flex: 1; padding: 8px 12px; border-radius: 20px; border: 1px solid #3a424e; font-size: 14px; background: #2d3440; color:#e4e9f1; outline: none;" />
                <button onclick="createNewChat()" style="padding: 8px 16px; border-radius: 20px; border: none; background: #4b6e9e; color: #fff; cursor: pointer; font-weight: bold; transition: background 0.2s;">+</button>
                    </div>
        </div>
        <div class="main-chat">
            <div class="header">
                <div>
                    <h3 class="header-title">Select a chat</h3>
                    <div style="font-size: 12px; color: #9ba7b6; margin-top: 4px;">Welcome User: {{ user_email }}</div>
                </div>
                <button id="order-bubble" class="order-bubble" onclick="viewCurrentOrder()" style="display: none;" title="View current order">
                    <span id="order-bubble-text">Order</span>
                </button>
            </div>
            <div class="chat-box" id="chat-box"></div>
            <div class="quick-actions">
                <button id="quick-create-order" class="quick-action-btn" onclick="quickAction('Create Order')">
                    <span class="btn-icon">📦</span> Create Order
                </button>
                <button id="quick-request-quotation" class="quick-action-btn" onclick="quickAction('Request Quotation')" style="display: none;">
                    <span class="btn-icon">📋</span> Request Quotation
                </button>
            </div>
            <div class="input-area">
                <textarea id="user-input" placeholder="Aa" rows="1" autocomplete="off"></textarea>
                <button onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>
    <script src="/static/js/chat.js"></script>
    <script src="/static/js/hamburger_menu.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Quotation</title>
    <link rel="stylesheet" href="/static/css/chat.css">
    <link rel="stylesheet" href="/static/css/hamburger_menu.css">
    <link rel="stylesheet" href="/static/css/orderQuotation.css">
</head>
<body>
    <div class="container">
        <div class="main-content">
            <div class="header">
                {% include 'components/hamburger_menu.html' %}
                <div>
                    <h3 class="header-title">Request Quotation</h3>
                    <div style="font-size: 12px; color: #9ba7b6; margin-top: 4px;">Welcome User: {{ user_email }}</div>
                </div>
            </div>
            
            <!-- Quotation Form -->
            <div class="tab-content active">
                <div class="form-container">
                    <h3>Request New Quotation</h3>
                    <form id="quotation-form" data-dockey="{{ dockey }}" data-draft-dockey="{{ draft_dockey }}">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="quotation-customer">Customer Email</label>
                                <input type="email" id="quotation-customer" value="{{ user_email }}" readonly>
                            </div>
                            
                            <div class="form-group">
                                <label for="quotation-company">Company Name</label>
                                <input type="text" id="quotation-company" value="Loading..." readonly>
                            </div>

                            <div class="form-group">
                                <label for="quotation-phone">Phone Number</label>
                                <input type="text" id="quotation-phone" value="Loading..." readonly>
                            </div>

                            <div class="form-group">
                                <label for="quotation-terms">Credit Terms</label>
                                <input type="text" id="quotation-terms" value="Loading..." readonly>
                            </div>

                            <div class="form-group">
                                <label for="quotation-validity">Valid Until</label>
                                <input type="date" id="quotation-validity">
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="quotation-address1">Address 1</label>
                                <input type="text" id="quotation-address1" value="Loading..." readonly>
                            </div>
                            
                            <div class="form-group">
                                <label for="quotation-address2">Address 2</label>
                                <input type="text" id="quotation-address2" value="Loading..." readonly>
                            </div>

                            <div class="form-group">
                                <label for="quotation-address3">Address 3</label>
                                <input type="text" id="quotation-address3" value="Loading..." readonly>
                            </div>

                            <div class="form-group">
                                <label for="quotation-address4">Address 4</label>
                                <input type="text" id="quotation-address4" value="Loading..." readonly>
                            </div>
                        </div>

                        <div class="form-row">
                            
                        </div>
                        
                        <div class="form-group" style="display: none;">
                            <textarea id="quotation-description" rows="3" readonly>Quotation</textarea>
                        </div>
                        
                      
                        <div class="item-row-header">
                            <span>Source</span>
                            <span>Product</span>
                            <span>Qty</span>
                            <span>Discount</span>
                            <span>Suggested Price</span>
                            <span>Unit Price</span>
                            <span>Delivery Date</span>
                            <span></span>
                        </div>
                        <div id="quotation-items-list">
                            <div class="order-item">
                                <div class="item-row">
                                    <select class="item-source" onchange="onProductSourceChange(this)">
                                        <option value="catalog">From catalog</option>
                                        <option value="custom">Custom order</option>
                                    </select>
                                    <select class="item-product" onchange="fetchProductPrice(this)">
                                        <option value="">Select product...</option>
                                    </select>
                                    <input type="text" class="item-product-custom" placeholder="Custom product" style="display:none;" onchange="fetchProductPrice(this)">
                                    <input type="number" class="item-qty" placeholder="Qty" min="1" value="1" onchange="calculateQuotationTotal()">
                                    <input type="number" class="item-discount" placeholder="Discount" step="0.01" min="0" value="0" onchange="calculateQuotationTotal()">
                                    <input type="number" class="item-suggested-price" placeholder="Suggested Price" step="0.01" min="0" readonly>
                                    <input type="number" class="item-price" placeholder="Unit Price" step="0.01" min="0" onchange="calculateQuotationTotal()">
                                    <input type="date" class="item-delivery-date">
                                    <button type="button" class="btn-remove" onclick="removeQuotationItem(this)">✕</button>
                                </div>
                            </div>
                        </div>
                        
                        <button type="button" class="btn-add-item" onclick="addQuotationItem()">+ Add Item</button>
                        
                        <div class="total-section">
                            <div class="total-row">
                                <span>Total:</span>
                                <span id="quotation-total">RM 0.00</span>
                            </div>
                        </div>
                        
                        <div class="form-actions">
                            <button type="button" class="btn-secondary" onclick="clearQuotationForm()">Clear</button>
                            <button type="button" id="save-draft-btn" class="btn-secondary">Save Draft</button>
                            <button type="submit" class="btn-primary">Submit Quotation</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Chat Bubble -->
    <button id="chat-bubble" class="chat-bubble" onclick="toggleChatPopup()" title="Chat with us">
        <span>💬</span>
    </button>
    
    <!-- Chat Popup Modal -->
    <div id="chat-popup" class="chat-popup hidden" data-size="normal">
        <div class="chat-popup-header">
            <h4>Chat Assistant</h4>
            <button type="button" class="close-btn" onclick="closeChatPopup()">✕</button>
        </div>
        <div id="chat-popup-messages" class="chat-popup-messages">
            <div class="chat-message bot-message">
                <div class="message-content">Hi! 👋 How can I help you with your quotation?</div>
            </div>
        </div>
        <div class="chat-popup-input">
            <textarea id="chat-popup-textarea" placeholder="Type your message..." rows="1"></textarea>
            <button type="button" class="send-btn" onclick="sendChatMessage()">Send</button>
        </div>
        <!-- Resize handles for all edges -->
        <div class="resize-handle right" data-edge="right"></div>
        <div class="resize-handle bottom" data-edge="bottom"></div>
    </div>
                            <!-- Hide Quotation Name field -->
                            <input type="hidden" id="quotation-name" name="quotationName" value="Quotation">
    
    <!-- Product Datalist for Autocomplete -->
    <datalist id="product-list">
        <!-- Populated by JavaScript -->
    </datalist>
    
    <script src="/static/js/hamburger_menu.js"></script>
    <script src="/static/js/orderQuotation.js?v=20260312_chat_restore"></script>
    <script>
        // Set today's date as default for all delivery date inputs on load
        document.addEventListener('DOMContentLoaded', function() {
            const today = new Date().toISOString().split('T')[0];
            document.querySelectorAll('.item-delivery-date').forEach(function(el) {
                if (!el.value) el.value = today;
            });
            // Default validity to today + 30 days
            const validityInput = document.getElementById('quotation-validity');
            if (validityInput && !validityInput.value) {
                const d = new Date();
                d.setDate(d.getDate() + 30);
                validityInput.value = d.toISOString().split('T')[0];
            }
            // Load customer information from database
            loadUserInfo();
        });
    </script>
</body>
</html>

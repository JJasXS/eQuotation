<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Chatbot</title>
    <link rel="stylesheet" href="/static/css/login.css?v=20260505_login_3070">
</head>
<body class="login-page-body">
    <div class="login-page">
        <aside class="login-aside" aria-label="Account type">
            <div class="login-aside-header">
                <p class="login-aside-kicker">Sign in as</p>
                <p class="login-aside-hint">Swipe or use arrows — we only look up your email in the directory you pick.</p>
            </div>
            <div class="login-carousel-viewport" id="login-carousel-viewport">
                <div class="login-carousel-track" id="login-carousel-track">
                    <button type="button" class="login-carousel-slide" data-mode="supplier" tabindex="-1">
                        <span class="login-carousel-icon" aria-hidden="true">🏭</span>
                        <span class="login-carousel-title">Supplier</span>
                        <span class="login-carousel-desc">Supplier portal — AR / AP supplier email</span>
                    </button>
                    <button type="button" class="login-carousel-slide is-active" data-mode="customer" tabindex="0">
                        <span class="login-carousel-icon" aria-hidden="true">🛒</span>
                        <span class="login-carousel-title">Customer</span>
                        <span class="login-carousel-desc">Quotations &amp; orders — AR customer / branch</span>
                    </button>
                    <button type="button" class="login-carousel-slide" data-mode="admin" tabindex="-1">
                        <span class="login-carousel-icon" aria-hidden="true">⚙️</span>
                        <span class="login-carousel-title">Admin / staff</span>
                        <span class="login-carousel-desc">Internal users — SY_USER email</span>
                    </button>
                </div>
            </div>
            <div class="login-carousel-nav">
                <button type="button" class="login-carousel-arrow" id="login-mode-prev" aria-label="Previous login type">‹</button>
                <div class="login-carousel-dots" id="login-carousel-dots" role="tablist" aria-label="Login type"></div>
                <button type="button" class="login-carousel-arrow" id="login-mode-next" aria-label="Next login type">›</button>
            </div>
        </aside>

        <div class="login-main">
            <div class="login-container">
                <div class="login-card">
                    <div id="email-step" class="login-step active">
                        <h1>Welcome</h1>
                        <p class="subtitle">Enter your email to continue</p>

                        <form id="email-form" onsubmit="handleEmailSubmit(event)">
                            <div class="form-group">
                                <label for="email">Email Address</label>
                                <input
                                    type="email"
                                    id="email"
                                    name="email"
                                    placeholder="your@email.com"
                                    required
                                    autocomplete="email"
                                />
                            </div>
                            <button type="submit" class="btn-submit">Continue</button>
                        </form>

                        <a href="/signInGuest" class="btn-guest">Sign in as Guest</a>

                        <div id="email-error" class="error-message"></div>
                    </div>

                    <div id="otp-step" class="login-step">
                        <h1>Verify Your Email</h1>
                        <p class="subtitle">Enter the 6-digit code sent to<br><span id="email-display">your@email.com</span></p>

                        <form id="otp-form" onsubmit="handleOtpSubmit(event)">
                            <div class="form-group">
                                <label for="otp-1">Enter OTP</label>
                                <div class="otp-boxes" id="otp-boxes">
                                    <input type="text" id="otp-1" class="otp-digit" maxlength="1" inputmode="numeric" autocomplete="one-time-code" required />
                                    <input type="text" id="otp-2" class="otp-digit" maxlength="1" inputmode="numeric" autocomplete="off" required />
                                    <input type="text" id="otp-3" class="otp-digit" maxlength="1" inputmode="numeric" autocomplete="off" required />
                                    <input type="text" id="otp-4" class="otp-digit" maxlength="1" inputmode="numeric" autocomplete="off" required />
                                    <input type="text" id="otp-5" class="otp-digit" maxlength="1" inputmode="numeric" autocomplete="off" required />
                                    <input type="text" id="otp-6" class="otp-digit" maxlength="1" inputmode="numeric" autocomplete="off" required />
                                </div>
                                <div class="otp-hint">6 digits only</div>
                            </div>
                            <button type="submit" class="btn-submit">Verify</button>
                        </form>

                        <div id="otp-error" class="error-message"></div>

                        <div class="otp-footer">
                            <p>Didn't receive the code? <button type="button" onclick="resendOtp()" class="btn-resend">Resend</button></p>
                            <button type="button" onclick="backToEmail()" class="btn-back">← Back</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/login.js?v=20260505_login_3070"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/static/css/admin.css">
    <link rel="stylesheet" href="/static/css/hamburger_menu.css">
</head>
<body>
    <div class="admin-container">
        <!-- Header with Hamburger Menu -->
        <div class="admin-header">
            {% include 'components/admin_hamburger_menu.html' %}
            <h2>Admin Dashboard</h2>
        </div>

        <!-- Welcome Section (Default View) -->
        <div class="admin-welcome" id="admin-welcome">
            <div class="welcome-content">
                <h1>Welcome Admin</h1>
                <p>Session: {{ user_email }}</p>
                <p>Use the menu to navigate dashboard features</p>
            </div>
        </div>




        <!-- Approvals Section (Hidden by default) -->
        <div class="admin-approvals" id="admin-approvals" style="display: none;">
            <div class="approvals-header">
                <h3>Pending Approvals</h3>
                <button class="back-btn" onclick="showWelcome()">← Back</button>
            </div>
            <div class="approvals-content" id="approvals-content">
                <div style="padding: 20px; text-align: center; color: #888;">
                    Loading...
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/admin_menu.js"></script>
</body>
</html>

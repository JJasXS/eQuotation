<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Quotation</title>
    <link rel="stylesheet" href="/static/css/chat.css">
    <link rel="stylesheet" href="/static/css/hamburger_menu.css">
    <link rel="stylesheet" href="/static/css/app_page_header.css">
    <link rel="stylesheet" href="/static/css/orderQuotation.css">
</head>
<body>
    <div class="container">
        <div class="main-content">
            {% set page_header_title = "Update Quotation" %}
            {% set page_header_subtitle = "Admin: " ~ (user_email or "—") %}
            {% include 'components/app_page_header.html' %}
            
            <!-- Quotation Form -->
            <div class="tab-content active">
                <div class="form-container">
                    <h3>Edit Quotation #<span id="quotation-docno">Loading...</span></h3>
                    <form id="update-quotation-form" data-dockey="{{ dockey }}">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="quotation-customer">Customer Code</label>
                                <input type="text" id="quotation-customer" value="Loading..." readonly>
                            </div>
                            
                            <div class="form-group">
                                <label for="quotation-company">Company Name</label>
                                <input type="text" id="quotation-company" value="Loading..." readonly>
                            </div>

                            <div class="form-group">
                                <label for="quotation-phone">Phone Number</label>
                                <input type="text" id="quotation-phone" value="Loading..." readonly>
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="quotation-address1">Address 1</label>
                                <input type="text" id="quotation-address1" value="Loading..." readonly>
                            </div>
                            
                            <div class="form-group">
                                <label for="quotation-address2">Address 2</label>
                                <input type="text" id="quotation-address2" value="Loading..." readonly>
                            </div>

                            <div class="form-group">
                                <label for="quotation-address3">Address 3</label>
                                <input type="text" id="quotation-address3" value="" readonly>
                            </div>

                            <div class="form-group">
                                <label for="quotation-address4">Address 4</label>
                                <input type="text" id="quotation-address4" value="" readonly>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="quotation-terms">Credit Terms</label>
                                <input type="text" id="quotation-terms" value="Loading..." readonly>
                            </div>

                            <div class="form-group">
                                <label for="quotation-validity">Valid Until</label>
                                <input type="date" id="quotation-validity">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="quotation-docdate">Document Date</label>
                            <input type="date" id="quotation-docdate" readonly>
                        </div>
                        
                        <div class="form-group" style="display: none;">
                            <textarea id="quotation-description" rows="3" readonly>Quotation</textarea>
                        </div>
                        
                     
                        <div class="item-row-header">
                            <span>Source</span>
                            <span>Product</span>
                            <span>Qty</span>
                            <span>Discount</span>
                            <span>Suggested Price</span>
                            <span>Unit Price</span>
                            <span>Delivery Date</span>
                            <span></span>
                        </div>
                        <div id="quotation-items-list">
                            <div style="padding: 20px; text-align: center; color: #888;">Loading items...</div>
                        </div>
                        
                        <button type="button" class="btn-add-item" onclick="addQuotationItem()">+ Add Item</button>
                        
                        <div class="total-section">
                            <div class="total-row">
                                <span>Total:</span>
                                <span id="quotation-total">RM 0.00</span>
                            </div>
                        </div>
                        
                        <div class="form-actions">
                            <button type="button" class="btn-secondary" onclick="window.location.href='/admin/view-quotations'">Cancel</button>
                            <button type="submit" class="btn-primary">Update Quotation</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/static/js/hamburger_menu.js"></script>
    <script src="/static/js/updateQuotation.js"></script>
</body>
</html>

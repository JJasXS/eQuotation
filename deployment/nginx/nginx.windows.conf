# Full nginx.conf for Windows test deployment of eQuotation
worker_processes  1;

error_log  logs/error.log warn;
pid        logs/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    upstream equotation_flask {
        server 127.0.0.1:5000;
    }

    upstream equotation_fastapi {
        server 127.0.0.1:8000;
    }

    upstream equotation_php {
        server 127.0.0.1:8080;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 20m;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # PHP endpoints
        location /php/ {
            proxy_pass http://equotation_php;
            proxy_http_version 1.1;
        }

        # FastAPI routes
        location /auth/ {
            proxy_pass http://equotation_fastapi;
            proxy_http_version 1.1;
        }

        location /api/ {
            proxy_pass http://equotation_fastapi;
            proxy_http_version 1.1;
        }

        location /docs {
            proxy_pass http://equotation_fastapi;
            proxy_http_version 1.1;
        }

        location /openapi.json {
            proxy_pass http://equotation_fastapi;
            proxy_http_version 1.1;
        }

        # Flask web app
        location / {
            proxy_pass http://equotation_flask;
            proxy_http_version 1.1;
        }
    }
}

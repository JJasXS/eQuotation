# eQuotation reverse proxy
# Public entrypoint: http://<server>:80
# Internal apps:
# - Flask UI:   http://127.0.0.1:5000
# - FastAPI:    http://127.0.0.1:8000
# - PHP/XAMPP:  http://127.0.0.1:8080

upstream equotation_flask {
    server 127.0.0.1:5000;
}

upstream equotation_fastapi {
    server 127.0.0.1:8000;
}

upstream equotation_php {
    server 127.0.0.1:8080;
}

server {
    listen 80;
    server_name _;

    # Allow larger payloads for forms / JSON if needed.
    client_max_body_size 20m;

    # Preserve original request information.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # PHP endpoints currently called as /php/*.php
    location /php/ {
        proxy_pass http://equotation_php;
        proxy_http_version 1.1;
    }

    # FastAPI routes (auth + API)
    # Keep this location above '/' so API calls don't fall through to Flask.
    location /auth/ {
        proxy_pass http://equotation_fastapi;
        proxy_http_version 1.1;
    }

    location /api/ {
        proxy_pass http://equotation_fastapi;
        proxy_http_version 1.1;
    }

    location /docs {
        proxy_pass http://equotation_fastapi;
        proxy_http_version 1.1;
    }

    location /openapi.json {
        proxy_pass http://equotation_fastapi;
        proxy_http_version 1.1;
    }

    # Flask web app (templates + static)
    location / {
        proxy_pass http://equotation_flask;
        proxy_http_version 1.1;
    }
}

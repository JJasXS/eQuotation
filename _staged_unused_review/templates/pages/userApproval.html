<!-- Approvals Page -->
<div class="main-approvals" id="main-approvals" style="display: none;">
    <div class="header">
        <div>
            <h3 class="header-title">Approvals</h3>
        </div>
    </div>
    <div class="approvals-tabs">
        <button class="approval-tab active" onclick="switchApprovalTab('pending')">Pending</button>
        <button class="approval-tab" onclick="switchApprovalTab('completed')">Completed</button>
        <button class="approval-tab" onclick="switchApprovalTab('cancelled')">Cancelled</button>
    </div>
    <div class="approvals-content" id="approvals-content">
        <div style="padding: 20px; text-align: center; color: #888;">
            No approvals to display
        </div>
    </div>
</div>
